name: fetch-logo
# Temporary utility: pulls the trimmed transparent logo from a link-shared
# Google Drive file into assets/logo-source.png (not the live logo path).
# Delete this file once the logo is swapped.
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download trimmed logo from Google Drive
        run: |
          curl -fL "https://drive.google.com/uc?export=download&id=1U-7SspEHSIF-9AZSL5h7t_nljFD_GSo0" -o assets/logo-source.png
          python3 - <<'EOF'
          import struct
          data = open('assets/logo-source.png', 'rb').read(26)
          assert data[:8] == b'\x89PNG\r\n\x1a\n', 'Not a PNG — is the Drive file (or folder) link-shared?'
          w, h = struct.unpack('>II', data[16:24])
          print(f'Got PNG {w}x{h}, color type {data[25]}')
          EOF
      - name: Commit
        run: |
          git config user.name "logo-fetch"
          git config user.email "actions@users.noreply.github.com"
          git add assets/logo-source.png
          git commit -m "Add trimmed transparent logo source (fetched from Drive)"
          git push
