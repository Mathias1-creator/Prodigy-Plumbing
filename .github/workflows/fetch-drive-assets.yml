name: temp-fetch-drive-assets
on: workflow_dispatch

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download updated images from Google Drive
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/homepage.png "https://drive.google.com/uc?export=download&id=16rnNWHBT0g40CfKQORbl8VOCEUvOxUCV&confirm=t"
          curl -fsSL -o /tmp/halo.jpg "https://drive.google.com/uc?export=download&id=1Puq5QBNTpIpl4QaLHJYE7UpOHcydOt8R&confirm=t"
          ls -la /tmp/homepage.png /tmp/halo.jpg
          # verify magic bytes so we never commit a Drive HTML interstitial
          [ "$(head -c 4 /tmp/homepage.png | xxd -p)" = "89504e47" ] || { echo "homepage.png is not a PNG"; head -c 300 /tmp/homepage.png; exit 1; }
          [ "$(head -c 3 /tmp/halo.jpg | xxd -p)" = "ffd8ff" ] || { echo "halo.jpg is not a JPEG"; head -c 300 /tmp/halo.jpg; exit 1; }
          mkdir -p incoming
          mv /tmp/homepage.png incoming/homepage-raw.png
          mv /tmp/halo.jpg incoming/halo-raw.jpg

      - name: Commit fetched assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add incoming
          git commit -m "temp: fetch updated homepage + halo images from Drive"
          git push
