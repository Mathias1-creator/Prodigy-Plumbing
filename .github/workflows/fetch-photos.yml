name: fetch-photos
# Temporary utility: pulls the 8 labeled service photos from the link-shared
# Google Drive folder into assets/photos/. Delete this file once they're in.
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download service photos from Google Drive
        run: |
          mkdir -p assets/photos
          declare -A photos=(
            [water-heaters]="1u4JodZ-L9G8mJO7XqMcQrax48SPmctIZ"
            [drain-cleaning]="10UaEWJ8Yflf8l8N8EoirSHqF66sI5gP7"
            [leak-detection]="1hNkhqWXETeMMXFckTUORhWIly4OSvTgT"
            [sewer-line]="12RZAI_vFAQQbXN2A2PrU-DD-VO03WkRt"
            [slab-leaks]="1VJ_vNHuA0G14qnCbGkrlm2rxfx2wejp_"
            [repipes]="1kphk_Nqq2gsu3DU8ugSAHclYiqbAtDoi"
            [gas-line]="1sWRMvqkoT0avIUuuFbQ7BpPSWJBVBxN9"
            [water-purification]="1iVHUke0tMAbJP8m0UmSGaiVJjP77Jksx"
          )
          for name in "${!photos[@]}"; do
            curl -fL "https://drive.google.com/uc?export=download&id=${photos[$name]}" -o "assets/photos/$name.jpg"
            magic=$(head -c 3 "assets/photos/$name.jpg" | xxd -p)
            if [ "$magic" != "ffd8ff" ]; then
              echo "::error::$name.jpg is not a JPEG (magic=$magic) — is the Drive folder link-shared?"
              exit 1
            fi
            echo "$name.jpg OK ($(stat -c%s assets/photos/$name.jpg) bytes)"
          done
      - name: Commit photos
        run: |
          git config user.name "photo-fetch"
          git config user.email "actions@users.noreply.github.com"
          git add assets/photos
          git commit -m "Add service photos (fetched from Drive)"
          git push
